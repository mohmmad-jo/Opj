<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عيد ميلاد سعيد</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:radial-gradient(circle at top,#1a001f,#000);
    overflow:hidden;
}

/* نجوم */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    animation:twinkle 2s infinite alternate;
}
@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

/* تسجيل الدخول */
#login{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:rgba(255,105,180,0.15);
    backdrop-filter:blur(25px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(255,20,147,0.7);
    width:90%;
    max-width:320px;
}

input{
    padding:12px;
    border-radius:10px;
    border:none;
    width:100%;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:10px;
    width:100%;
    background:linear-gradient(45deg,#ff4d6d,#ff8fab);
    color:white;
    cursor:pointer;
}

#error{color:#ffd166;margin-top:10px;}

/* الصفحة الرئيسية */
#main{
    display:none;
    text-align:center;
    color:#fff;
    padding:20px;
    opacity:0;
    transition:1s;
}

/* عد تنازلي */
#countdown{
    display:none;
    font-size:100px;
    font-weight:bold;
    color:#ff69b4; /* زهري واضح */
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:9999;
    text-shadow: 3px 3px 12px #000;
    text-align:center;
}

/* العنوان والرسالة */
.title{
    font-size:32px;
    background:linear-gradient(45deg,#ff4d6d,#ffb6c1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip: text;
}

.message{
    margin-top:20px;
    font-size:18px;
    line-height:2;
    background:rgba(0,0,0,0.7);
    padding:20px;
    border-radius:20px;
}

/* قلوب */
.heart{
    font-size:50px;
    animation:beat 1s infinite;
}
@keyframes beat{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.3);}
}

/* قلوب طائرة */
.heart-float{
    position:absolute;
    bottom:-50px;
    animation: floatUp 6s linear infinite;
}
@keyframes floatUp{
    0%{transform:translateY(0);}
    100%{transform:translateY(-100vh);}
}

/* الوردة */
#roseBox{
    margin-top:30px;
}
svg{
    width:180px;
    cursor:pointer;
}

/* بتلات تسقط */
.petal{
    position:absolute;
    width:18px;
    height:28px;
    background:radial-gradient(circle at 30% 30%, #ff8fab, #b3003c);
    border-radius:50% 50% 60% 60%;
    animation:fall 2.5s ease-in forwards;
}
@keyframes fall{
    0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    100%{
        transform:translateY(500px) rotate(220deg) translateX(40px);
        opacity:0;
    }
}

#loveText{
    margin-top:15px;
    font-size:22px;
    color:#ff8fab;
}
</style>
</head>

<body>

<div id="login">
    <div class="box">
        <h2>ادخل كلمة السر</h2>
        <input type="password" id="password">
        <button onclick="checkPassword()">دخول</button>
        <div id="error"></div>
    </div>
</div>

<!-- العد التنازلي خارج main -->
<div id="countdown"></div>

<div id="main">
    <div class="title">🎂 عيد ميلاد قلبي 🎂</div>
    <div class="heart">❤️</div>
    <div class="message" id="typedText"></div>

    <div id="roseBox">
        <svg id="rose" viewBox="0 0 200 300" onclick="pluckPetal()">
            <rect x="97" y="140" width="6" height="150" fill="#1b5e20"/>
            <ellipse cx="80" cy="180" rx="20" ry="10" fill="#2e7d32"/>
            <ellipse cx="120" cy="200" rx="20" ry="10" fill="#388e3c"/>
            <path class="petalReal" d="M100 90 C120 60,150 80,130 110 C110 140,90 130,100 90" fill="url(#grad1)"/>
            <path class="petalReal" d="M100 90 C80 60,50 80,70 110 C90 140,110 130,100 90" fill="url(#grad2)"/>
            <path class="petalReal" d="M100 100 C130 90,140 120,110 140 C90 150,80 120,100 100" fill="url(#grad3)"/>
            <path class="petalReal" d="M100 80 C120 70,130 100,100 110 C80 120,70 90,100 80" fill="url(#grad4)"/>
            <path class="petalReal" d="M100 95 C115 85,120 105,100 115 C85 120,80 100,100 95" fill="url(#grad5)"/>
            <defs>
                <linearGradient id="grad1"><stop offset="0%" stop-color="#ff4d6d"/><stop offset="100%" stop-color="#b3003c"/></linearGradient>
                <linearGradient id="grad2"><stop offset="0%" stop-color="#ff758f"/><stop offset="100%" stop-color="#c2185b"/></linearGradient>
                <linearGradient id="grad3"><stop offset="0%" stop-color="#ff8fab"/><stop offset="100%" stop-color="#ad1457"/></linearGradient>
                <linearGradient id="grad4"><stop offset="0%" stop-color="#ff4d6d"/><stop offset="100%" stop-color="#880e4f"/></linearGradient>
                <linearGradient id="grad5"><stop offset="0%" stop-color="#ffb6c1"/><stop offset="100%" stop-color="#c2185b"/></linearGradient>
            </defs>
        </svg>
        <div id="loveText"></div>
    </div>
</div>

<script>
// نجوم الخلفية
for(let i=0;i<70;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}

// عدد المحاولات
let attempts = 0;

// كلمة السر
function checkPassword(){
    let val = document.getElementById("password").value;
    if(val==="بيانو"){
        document.getElementById("login").style.display="none";
        showCountdown(3); // بدء العد التنازلي
    } else {
        attempts++;
        document.getElementById("error").innerText="غلط";
        if(attempts >=3){
            notifyHint();
        }
    }
}

// إشعار التلميح
function notifyHint(){
    if(Notification.permission === "granted"){
        new Notification("تلميح كلمة السر ", { body:"اكثر دلع كنت بحكيلك اياه" });
    } else if(Notification.permission !== "denied"){
        Notification.requestPermission().then(permission=>{
            if(permission==="granted"){
                new Notification("تلميح كلمة السر ", { body:"اكثر دلع كنت بحكيلك اياه" });
            }
        });
    }
}

// عد تنازلي قبل المعايدة
function showCountdown(num){
    const countdown = document.getElementById("countdown");
    countdown.style.display = "block";
    countdown.innerText = num;
    let interval = setInterval(()=>{
        num--;
        if(num>0){
            countdown.innerText = num;
        } else {
            clearInterval(interval);
            countdown.style.display = "none";
            let main = document.getElementById("main");
            main.style.display = "block";
            setTimeout(()=>main.style.opacity="1",100);
            startTyping();
        }
    },1000);
}

// كتابة الرسالة
let text=`   حابب اعايد عليكي باللغة العامية زي ما عيدتي علي اول مرة   
  كل عام وانتي قلبي كل عام وانتي بخير يا احلا وحدة شفتها ❤️

اليوم مش يوم عادي اليوم عيد ميلاد وحدة بيضة وحلوة ومزةةة من يوم ما عرفتها    🎂
 ان شاء الله تكون سنينك الجاي خير عليكي واقرب الى الله 
 ااا صراحة بطلت اعرف احكي واتغزل زي قبل المهم حبيت اعملك هدية بسيطة جدا اني اعمل هاض الموقع كمعايدة الك كنت حابب اجبلك هدية بتناسب الجمال الي بقرا
 ان شاء الله نلتقي بالحلال ووقتها من عيوني    
 اضن طولت عليكي بس هاي جد راح تكون اخر رسالة مني الك بدي منك تتميزي بكل شي وبتوفيق بكل شي بتعملي والله ينور طريقك دايما وبس والله لف يو للامانة 
........انتفي الورد لا تنسي 

  `;

let i=0;
function startTyping(){
    function type(){
        if(i<text.length){
            document.getElementById("typedText").innerHTML += text.charAt(i);
            i++;
            setTimeout(type,40);
        }
    }
    type();
}

// قلوب طائرة
function startHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart-float";
        h.innerText="❤️";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),6000);
    },400);
}
startHearts();

// الوردة الواقعية
let petals=document.querySelectorAll(".petalReal");
let index=0;

function pluckPetal(){
    if(index<petals.length){
        let p=petals[index];
        let rect=p.getBoundingClientRect();
        let fall=document.createElement("div");
        fall.className="petal";
        fall.style.left=rect.left+"px";
        fall.style.top=rect.top+"px";
        document.body.appendChild(fall);
        p.style.opacity="0";
        p.style.transform="scale(0.8)";
        index++;
        if(index===petals.length){
            document.getElementById("loveText").innerText="احبج من قلبي ❤️";
        }
    }
}
</script>

</body>
</html>
